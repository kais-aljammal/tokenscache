<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TokensCache Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1419;
        --panel: #1a2332;
        --border: #2d3a4f;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --accent: #3d9eff;
        --success: #3ecf8e;
        --warn: #f5a623;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      header {
        padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 600;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.9rem;
      }

      main {
        padding: 2rem;
        max-width: 1100px;
        margin: 0 auto;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
      }

      .card h2 {
        margin: 0 0 0.5rem;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        font-weight: 600;
      }

      .value {
        font-size: 1.75rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .value.small {
        font-size: 1.1rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
      }

      .dot.warn {
        background: var(--warn);
      }

      .error {
        color: #ff6b6b;
        margin-top: 1rem;
      }

      footer {
        margin-top: 2rem;
        color: var(--muted);
        font-size: 0.85rem;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.1);
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>TokensCache Dashboard</h1>
        <div class="subtitle">Spend, cache hits, and budget status from SQLite ledger</div>
      </div>
      <button id="refresh">Refresh</button>
    </header>

    <main>
      <div class="grid">
        <section class="card">
          <h2>Total Spend</h2>
          <div class="value" id="spend">—</div>
        </section>
        <section class="card">
          <h2>Cache Hits</h2>
          <div class="value" id="cache-hits">—</div>
          <div class="status"><span class="dot" id="cache-dot"></span><span id="cache-read">—</span></div>
        </section>
        <section class="card">
          <h2>Session Spend</h2>
          <div class="value" id="session-spend">—</div>
        </section>
        <section class="card">
          <h2>Daily Spend</h2>
          <div class="value" id="daily-spend">—</div>
        </section>
        <section class="card">
          <h2>Input Tokens</h2>
          <div class="value small" id="input-tokens">—</div>
        </section>
        <section class="card">
          <h2>Output Tokens</h2>
          <div class="value small" id="output-tokens">—</div>
        </section>
        <section class="card">
          <h2>Sessions</h2>
          <div class="value small" id="sessions">—</div>
        </section>
        <section class="card">
          <h2>24h Entries</h2>
          <div class="value small" id="recent">—</div>
        </section>
      </div>

      <p class="error" id="error" hidden></p>
      <footer>Auto-refreshes every 30 seconds · localhost:7432</footer>
    </main>

    <script>
      const fmtUsd = (n) => `$${Number(n || 0).toFixed(4)}`;
      const fmtInt = (n) => Number(n || 0).toLocaleString();

      async function loadDashboard() {
        const errorEl = document.getElementById("error");
        errorEl.hidden = true;

        try {
          const [metricsRes, budgetRes] = await Promise.all([
            fetch("/api/metrics"),
            fetch("/api/budget"),
          ]);

          if (!metricsRes.ok || !budgetRes.ok) {
            throw new Error("Failed to load dashboard data");
          }

          const metrics = await metricsRes.json();
          const budget = await budgetRes.json();

          document.getElementById("spend").textContent = fmtUsd(metrics.totalSpendUsd);
          document.getElementById("cache-hits").textContent = fmtInt(metrics.cacheHits);
          document.getElementById("cache-read").textContent =
            `${fmtInt(metrics.cacheReadTokens)} cache-read tokens`;
          document.getElementById("session-spend").textContent = fmtUsd(budget.sessionSpendUsd);
          document.getElementById("daily-spend").textContent = fmtUsd(budget.dailySpendUsd);
          document.getElementById("input-tokens").textContent = fmtInt(metrics.totalInputTokens);
          document.getElementById("output-tokens").textContent = fmtInt(metrics.totalOutputTokens);
          document.getElementById("sessions").textContent = fmtInt(metrics.sessionCount);
          document.getElementById("recent").textContent = fmtInt(metrics.recentEntries);

          const dot = document.getElementById("cache-dot");
          dot.classList.toggle("warn", metrics.cacheHits === 0);
        } catch (err) {
          errorEl.textContent = err.message || "Dashboard load failed";
          errorEl.hidden = false;
        }
      }

      document.getElementById("refresh").addEventListener("click", loadDashboard);
      loadDashboard();
      setInterval(loadDashboard, 30000);
    </script>
  </body>
</html>
